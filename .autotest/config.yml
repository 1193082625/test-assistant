project:
  name: test-assistant
  type: auto
  test_framework: auto
test_types:
  unit:
    enabled: true
    priority: 1
  integration:
    enabled: true
    priority: 2
  e2e:
    enabled: false
    priority: 3
  edge:
    enabled: false
    priority: 4
  accessibility:
    enabled: false
    priority: 5
  visual:
    enabled: false
    priority: 6
  mock:
    enabled: false
    priority: 7
  performance:
    enabled: false
    priority: 8
  mutation:
    enabled: false
    priority: 9
execution:
  auto_run: true
  timeout_seconds: 120
  parallel: false
llm:
  provider: openai
  model: gpt-4o
watch:
  enabled: false
  patterns:
    - "**/*.py"
    - "**/*.js"
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.jsx"
